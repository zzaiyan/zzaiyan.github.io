<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <ul class="visible-links">
          <li
            class="masthead__menu-item masthead__menu-item--lg masthead__menu-home-item"
          >
            <a href="#about-me"><span class="lang-en">Homepage</span><span class="lang-zh">主页</span></a>
          </li>
          {% for link in site.data.navigation.main %}
          <li class="masthead__menu-item">
            <a href="{{ domain }}{{ link.url }}"><span class="lang-en">{{ link.title }}</span><span class="lang-zh">{{ link.title_zh | default: link.title }}</span></a>
          </li>
          {% endfor %}
        </ul>
        <button class="greedy-nav__more hidden" aria-label="More links"><i class="fas fa-chevron-down"></i></button>
        <ul class="hidden-links hidden"></ul>
      </nav>
      <div class="masthead__toolbar">
        <button id="theme-toggle" class="toolbar-btn" aria-label="Toggle dark mode"><i class="fas fa-sun"></i></button>
        <button id="lang-toggle" class="toolbar-btn" aria-label="Switch language">EN</button>
      </div>
    </div>
  </div>
</div>
